<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GymSuite AI — New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Outfit', system-ui, sans-serif; background: #07090f; color: #e8eaf0; -webkit-font-smoothing: antialiased; }
    body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 28px 28px; pointer-events: none; }
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.07; pointer-events: none; }
    .blob-1 { width: 600px; height: 400px; background: #3b4fd4; top: -180px; left: -120px; }
    .blob-2 { width: 400px; height: 350px; background: #5b21b6; bottom: -100px; right: -80px; }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 420px; background: #0c1018; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 44px 40px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-dot { width: 28px; height: 28px; background: #5b6cf5; border-radius: 8px; flex-shrink: 0; }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-sub { font-size: 11px; color: rgba(232,234,240,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: rgba(232,234,240,0.5); margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: rgba(232,234,240,0.6); margin-bottom: 6px; font-weight: 500; }
    .field { margin-bottom: 18px; }
    .input-wrap { position: relative; }
    input[type=password], input[type=text] { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; font-family: inherit; font-size: 15px; color: #e8eaf0; outline: none; transition: border-color 0.15s; }
    input.has-toggle { padding-right: 44px; }
    input:focus { border-color: rgba(91,108,245,0.6); }
    .toggle-vis { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; color: rgba(232,234,240,0.35); font-size: 16px; line-height: 1; transition: color 0.15s; }
    .toggle-vis:hover { color: rgba(232,234,240,0.7); }
    .btn { width: 100%; background: #5b6cf5; border: none; border-radius: 10px; padding: 13px; font-family: inherit; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; transition: opacity 0.15s, background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .btn:hover:not(:disabled) { background: #4a5be0; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 14px; display: none; }
    .msg.show { display: block; }
    .msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
    .msg.error { background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.25); color: #fb7185; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: rgba(232,234,240,0.4); text-decoration: none; transition: color 0.15s; }
    .back:hover { color: rgba(232,234,240,0.7); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="page">
    <div class="card">
      <div class="logo">
        <div class="logo-dot"></div>
        <div>
          <div class="logo-text">GymSuite AI</div>
          <div class="logo-sub">Operations Platform</div>
        </div>
      </div>
      <h1>New password</h1>
      <p class="subtitle">Choose a strong password</p>
      <form id="form" onsubmit="doReset(event)">
        <div class="field">
          <label for="password">New password</label>
          <div class="input-wrap">
            <input type="password" id="password" class="has-toggle" required placeholder="••••••••"/>
            <button type="button" class="toggle-vis" onclick="togglePw('password', this)">👁</button>
          </div>
        </div>
        <div class="field">
          <label for="confirm">Confirm new password</label>
          <div class="input-wrap">
            <input type="password" id="confirm" class="has-toggle" required placeholder="••••••••"/>
            <button type="button" class="toggle-vis" onclick="togglePw('confirm', this)">👁</button>
          </div>
        </div>
        <button class="btn" id="submit-btn" type="submit">
          <span id="btn-label">Reset Password</span>
        </button>
        <div class="msg success" id="success-msg">Password updated. <a href="/login" style="color:#4ade80">Sign in now.</a></div>
        <div class="msg error" id="error-msg"></div>
      </form>
      <a href="/login" class="back">Back to sign in</a>
    </div>
  </div>
  <script>
    const OPS_URL = 'https://gymsuiteai-dashboard-production.up.railway.app';
    const token = new URLSearchParams(window.location.search).get('token');

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }

    function setLoading(v) {
      const btn = document.getElementById('submit-btn');
      btn.disabled = v;
      document.getElementById('btn-label').innerHTML = v ? '<div class="spinner"></div>' : 'Reset Password';
    }

    async function doReset(e) {
      e.preventDefault();
      document.getElementById('error-msg').classList.remove('show');
      const pw = document.getElementById('password').value;
      const cf = document.getElementById('confirm').value;
      if (pw !== cf) {
        const el = document.getElementById('error-msg');
        el.textContent = 'Passwords do not match.';
        el.classList.add('show');
        return;
      }
      if (!token) {
        const el = document.getElementById('error-msg');
        el.textContent = 'This reset link is invalid or has expired. Request a new one.';
        el.classList.add('show');
        return;
      }
      setLoading(true);
      try {
        const res = await fetch(OPS_URL + '/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pw }),
        });
        const data = await res.json();
        if (!res.ok) {
          const el = document.getElementById('error-msg');
          el.textContent = data.error || 'This reset link is invalid or has expired. Request a new one.';
          el.classList.add('show');
        } else {
          document.getElementById('success-msg').classList.add('show');
          document.getElementById('form').querySelector('button[type=submit]').disabled = true;
        }
      } catch {
        const el = document.getElementById('error-msg');
        el.textContent = 'Connection error. Please try again.';
        el.classList.add('show');
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
