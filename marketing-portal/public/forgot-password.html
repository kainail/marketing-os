<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GymSuite AI — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Outfit', system-ui, sans-serif; background: #07090f; color: #e8eaf0; -webkit-font-smoothing: antialiased; }
    body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 28px 28px; pointer-events: none; }
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.07; pointer-events: none; }
    .blob-1 { width: 600px; height: 400px; background: #3b4fd4; top: -180px; left: -120px; }
    .blob-2 { width: 400px; height: 350px; background: #5b21b6; bottom: -100px; right: -80px; }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 420px; background: #0c1018; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 44px 40px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-dot { width: 28px; height: 28px; background: #5b6cf5; border-radius: 8px; flex-shrink: 0; }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-sub { font-size: 11px; color: rgba(232,234,240,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: rgba(232,234,240,0.5); margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: rgba(232,234,240,0.6); margin-bottom: 6px; font-weight: 500; }
    .field { margin-bottom: 18px; }
    input[type=email] { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; font-family: inherit; font-size: 15px; color: #e8eaf0; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: rgba(91,108,245,0.6); }
    .btn { width: 100%; background: #5b6cf5; border: none; border-radius: 10px; padding: 13px; font-family: inherit; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; transition: opacity 0.15s, background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .btn:hover:not(:disabled) { background: #4a5be0; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-msg { margin-top: 16px; padding: 12px 14px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); border-radius: 8px; font-size: 14px; color: #4ade80; display: none; }
    .success-msg.show { display: block; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: rgba(232,234,240,0.4); text-decoration: none; transition: color 0.15s; }
    .back:hover { color: rgba(232,234,240,0.7); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="page">
    <div class="card">
      <div class="logo">
        <div class="logo-dot"></div>
        <div>
          <div class="logo-text">GymSuite AI</div>
          <div class="logo-sub">Operations Platform</div>
        </div>
      </div>
      <h1>Reset password</h1>
      <p class="subtitle">Enter your email and we'll send a reset link</p>
      <form id="form" onsubmit="doRequest(event)">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required placeholder="you@example.com"/>
        </div>
        <button class="btn" id="submit-btn" type="submit">
          <span id="btn-label">Send Reset Link</span>
        </button>
        <div class="success-msg" id="success-msg">If that email is registered, you'll receive a reset link shortly.</div>
      </form>
      <a href="/login" class="back">Back to sign in</a>
    </div>
  </div>
  <script>
    const OPS_URL = 'https://gymsuiteai-dashboard-production.up.railway.app';
    function setLoading(v) {
      const btn = document.getElementById('submit-btn');
      const label = document.getElementById('btn-label');
      btn.disabled = v;
      label.innerHTML = v ? '<div class="spinner"></div>' : 'Send Reset Link';
    }
    async function doRequest(e) {
      e.preventDefault();
      setLoading(true);
      const email = document.getElementById('email').value.trim().toLowerCase();
      try {
        await fetch(OPS_URL + '/api/auth/reset-password-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
      } catch {}
      document.getElementById('success-msg').classList.add('show');
      document.getElementById('form').querySelector('button').disabled = true;
      setLoading(false);
    }
  </script>
</body>
</html>
